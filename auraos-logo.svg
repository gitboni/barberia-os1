<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c96b"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Glow -->
  <circle cx="100" cy="100" r="70" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#ring1)" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="6 4"/>

  <!-- Middle ring -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="url(#ring2)" stroke-width="1"/>

  <!-- Inner aura arcs — 3 arcs evenly spaced -->
  <path d="M100,52 A48,48 0 0,1 141.6,124" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M141.6,124 A48,48 0 0,1 58.4,124" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M58.4,124 A48,48 0 0,1 100,52"   fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#c9a84c" opacity="0.9"/>
  <circle cx="100" cy="100" r="10" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

  <!-- Word mark -->
  <text x="100" y="162" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#c9a84c" text-anchor="middle" letter-spacing="6">AURA</text>
  <text x="100" y="178" font-family="'Arial', sans-serif" font-size="10" fill="#c9a84c" text-anchor="middle" letter-spacing="8" opacity="0.6">OS</text>
</svg>
